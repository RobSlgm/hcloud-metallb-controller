apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hcloud-metallb-controller.fullname" . }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - create
      - update
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
#   - apiGroups:
#       - metallb.io
#     resources:
#       - servicebgpstatuses
#       - servicebgpstatuses/status
#     verbs:
#       - get
#       - list
#       - watch
  - apiGroups:
      - metallb.io
    resources:
      - ipaddresspools
      - servicel2statuses
      - servicel2statuses/status
    verbs:
      - get
      - list
      - watch
