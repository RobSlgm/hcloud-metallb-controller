apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hcloud-metallb-controller.fullname" . -}}-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hcloud-metallb-controller.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "hcloud-metallb-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
