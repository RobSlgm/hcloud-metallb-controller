name: 🏭 Build Hcloud Metallb Controller

on:
  workflow_dispatch:
  push:
    branches:
      - release/**
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  PROJECT_PATH: "HcloudMetallbController/HcloudMetallbController.csproj"
  CHART_NAME: "hcloud-metallb-controller"
  CHART_REPO: charts
  DOTNET_VERSION: "10.x"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: dotnet/nbgv@v0.5.1
        id: meta
        with:
          setAllVars: true

      - name: Prepare lower case names
        id: migr
        run: |
          REPOSITORY_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_lc=$REPOSITORY_LC" >> $GITHUB_OUTPUT
          REPOSITORY_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_owner_lc=$REPOSITORY_OWNER_LC" >> $GITHUB_OUTPUT

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish server container to registry
        env:
          REPOSITORY_LC: ${{ steps.migr.outputs.repository_lc }}
          IMAGE_NAME: "hcloud-metallb-operator"
          ContainerImageTags: "${{ steps.meta.outputs.SemVer2 }};${{ steps.meta.outputs.MajorMinorVersion }};${{ steps.meta.outputs.Version }};latest"
        run: |
          dotnet publish \
            ${{ env.PROJECT_PATH }} \
            /t:PublishContainer \
            -p ContainerRegistry=${{ env.REGISTRY }} \
            -p ContainerRepository=${REPOSITORY_LC}

      - name: Push Helm chart
        env:
          VERSION: ${{ steps.meta.outputs.SemVer2 }}
          REPOSITORY_OWNER_LC: ${{ steps.migr.outputs.repository_owner_lc }}
        run: |
          helm package ./deploy --version "$VERSION" --app-version "$VERSION"
          helm push ${{ env.CHART_NAME }}-${VERSION}.tgz oci://${{ env.REGISTRY }}/${REPOSITORY_OWNER_LC}/${{ env.CHART_REPO }}
